name: Build on Merge to Master

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Release APKs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APKs
        run: ./gradlew assembleFreeRelease assemblePlayRelease --stacktrace

      - name: Upload free flavor APK
        uses: actions/upload-artifact@v4
        with:
          name: radiodroid-free-release-${{ github.sha }}
          path: app/build/outputs/apk/free/release/*.apk
          retention-days: 30

      - name: Upload play flavor APK
        uses: actions/upload-artifact@v4
        with:
          name: radiodroid-play-release-${{ github.sha }}
          path: app/build/outputs/apk/play/release/*.apk
          retention-days: 30
