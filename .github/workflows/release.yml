name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: 17
    - name: Build APK
      run: bash ./gradlew assembleFreeDebug --stacktrace
    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        APK_PATH=$(find app/build/outputs/apk/free/debug -name "*.apk" | head -1)
        gh release create "${{ github.ref_name }}" "$APK_PATH" \
          --title "RadioDroid ${{ github.ref_name }}" \
          --generate-notes
